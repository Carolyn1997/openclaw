<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenPaw Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0e1420;
    --surface2: #141c2a;
    --border: rgba(255,255,255,0.08);
    --text: #e8edf5;
    --muted: #6b7a94;
    --green: #fb923c;
    --green-glow: rgba(251,146,60,0.25);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* 侧边栏 */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 32px 20px;
    height: 100vh;
    overflow-y: auto;
    position: fixed;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 60px;
    color: white;
  }

  .nav-item {
    padding: 14px 20px;
    margin: 6px 0;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    text-decoration: none;
    transition: all 0.2s;
    font-size: 15px;
  }

  .nav-item:hover, .nav-item.active {
    background: var(--surface2);
    color: white;
  }

  /* 主内容 */
  .main-content {
    margin-left: 260px;
    flex: 1;
    padding: 40px 60px;
    overflow-y: auto;
    height: 100vh;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
  }

  .balance-card {
    background: linear-gradient(135deg, #1a2333, #0f1720);
    border: 1px solid var(--green);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 32px;
  }

  .balance-amount {
    font-size: 52px;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    color: var(--green);
    letter-spacing: -2px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  /* API Key 列表 */
  .key-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .key-item {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .key-item:last-child { border-bottom: none; }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .modal-content {
    background: var(--surface);
    border-radius: 20px;
    width: 420px;
    padding: 32px;
  }

  button {
    background: var(--green);
    color: #080c10;
    border: none;
    padding: 12px 28px;
    border-radius: 9999px;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- 侧边栏 -->
<div class="sidebar">
  <div class="logo">
    <span>🐾</span> OpenPaw
  </div>
  <a href="#" class="nav-item active" onclick="showPage('dashboard')">🏠 仪表盘</a>
  <a href="#" class="nav-item" onclick="showPage('keys')">🔑 API Keys</a>
  <a href="#" class="nav-item" onclick="showPage('usage')">📊 用量统计</a>
  <a href="#" class="nav-item" onclick="showPage('billing')">💰 充值记录</a>
  <a href="#" class="nav-item" onclick="showRechargeModal()">💵 立即充值</a>
  <a href="index.html" class="nav-item">← 返回首页</a>
</div>

<!-- 主内容 -->
<div class="main-content" id="main-content">

  <!-- Dashboard Page -->
  <div id="page-dashboard">
    <div class="header">
      <h1 style="font-size: 32px; font-weight: 800;">仪表盘</h1>
      <div>欢迎回来，<strong>用户</strong></div>
    </div>

    <div class="balance-card">
      <div style="color:var(--muted); font-size:15px;">当前余额</div>
      <div class="balance-amount">$124.80</div>
      <div style="margin-top:8px; color:#4ade80;">≈ 1.248 亿 tokens • 永不过期</div>
      <button onclick="showRechargeModal()" style="margin-top:24px;">立即充值</button>
    </div>

    <div class="card-grid">
      <div class="card">
        <h3>今日消耗</h3>
        <div style="font-size:32px; font-weight:700; margin:12px 0;">248,392 tokens</div>
      </div>
      <div class="card">
        <h3>活跃 API Keys</h3>
        <div style="font-size:32px; font-weight:700; margin:12px 0;">7</div>
      </div>
      <div class="card">
        <h3>本月花费</h3>
        <div style="font-size:32px; font-weight:700; margin:12px 0;">$87.40</div>
      </div>
    </div>
  </div>

  <!-- API Keys Page -->
  <div id="page-keys" style="display:none;">
    <div class="header">
      <h1 style="font-size: 32px; font-weight: 800;">API Keys</h1>
      <button onclick="createNewKey()">+ 新建 API Key</button>
    </div>
    <div class="key-list" id="key-list"></div>
  </div>

</div>

<!-- 充值模态框 -->
<div class="modal" id="recharge-modal">
  <div class="modal-content">
    <h2 style="margin-bottom:24px;">立即充值</h2>
    <p>请选择充值金额（美元）</p>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:20px 0;">
      <button onclick="recharge(10)" style="width:100%;">$10</button>
      <button onclick="recharge(30)" style="width:100%;">$30</button>
      <button onclick="recharge(50)" style="width:100%;">$50</button>
      <button onclick="recharge(100)" style="width:100%;">$100</button>
    </div>
    <button onclick="closeModal()" style="background:#333; width:100%; margin-top:12px;">取消</button>
  </div>
</div>

<script>
  let keys = [
    { id: 1, name: "Default Key", key: "opw_sk_8f3k9x2m1p7q", created: "2026-04-20", usage: "124k tokens" },
    { id: 2, name: "Production Key", key: "opw_sk_9v4n2x7q1m8p", created: "2026-04-25", usage: "89k tokens" }
  ];

  function renderKeys() {
    const container = document.getElementById('key-list');
    container.innerHTML = '';
    keys.forEach(k => {
      const div = document.createElement('div');
      div.className = 'key-item';
      div.innerHTML = `
        <div>
          <strong>${k.name}</strong><br>
          <span style="font-family:monospace; font-size:13px; color:var(--muted);">${k.key}</span>
        </div>
        <div style="text-align:right;">
          <small>${k.created}</small><br>
          <small>${k.usage}</small>
        </div>
      `;
      container.appendChild(div);
    });
  }

  function createNewKey() {
    const name = prompt("请输入新 API Key 名称：", "New Key");
    if (name) {
      keys.push({
        id: Date.now(),
        name: name,
        key: "opw_sk_" + Math.random().toString(36).substring(2,15),
        created: "2026-04-27",
        usage: "0 tokens"
      });
      renderKeys();
    }
  }

  function showPage(page) {
    document.querySelectorAll('#main-content > div').forEach(div => div.style.display = 'none');
    document.getElementById(`page-${page}`).style.display = 'block';

    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    event.currentTarget.classList.add('active');
  }

  function showRechargeModal() {
    document.getElementById('recharge-modal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('recharge-modal').style.display = 'none';
  }

  function recharge(amount) {
    alert(`已发起 $${amount} 充值请求（实际支付功能后续接入 Stripe）`);
    closeModal();
  }

  // 初始化
  window.onload = () => {
    renderKeys();
    showPage('dashboard');
  };
</script>
</body>
</html>
